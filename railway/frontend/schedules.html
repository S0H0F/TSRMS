<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailWay SA — Schedules</title>
<script>var PAGE_ROLES=["admin","staff"];</script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--c-green:#006633;--c-green-dark:#004D26;--c-green-mid:#00853D;--c-green-light:#CCE8D9;--c-green-pale:#EFF7F2;--c-gold:#C9A84C;--c-gold-dark:#9E7B1E;--c-gold-light:#F5E9C6;--bg:#F2F5F3;--surface:#FFFFFF;--surface-raised:#F8FBF9;--border:#D8E5DD;--text-primary:#112218;--text-secondary:#4A6858;--text-muted:#7A9888;--shadow:0 2px 12px rgba(0,102,51,0.08);--shadow-md:0 4px 24px rgba(0,102,51,0.12);--radius:14px;--sidebar-w:260px;--sidebar-bg:#004D26;--sidebar-text:rgba(255,255,255,0.8);--sidebar-hover:rgba(255,255,255,0.07);--sidebar-active-bg:rgba(201,168,76,0.18);--sidebar-active-text:#C9A84C;}
[data-theme="dark"]{--bg:#0A1610;--surface:#142218;--surface-raised:#1C2E20;--border:#2A4030;--text-primary:#E0EFE6;--text-secondary:#8AB898;--text-muted:#5A7A68;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-md:0 4px 24px rgba(0,0,0,0.4);--sidebar-bg:#0A1610;--sidebar-hover:rgba(255,255,255,0.05);--sidebar-active-bg:rgba(201,168,76,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit','Tajawal',sans-serif;background:var(--bg);color:var(--text-primary);display:flex;min-height:100vh;transition:background 0.3s,color 0.3s;}
[dir="rtl"]{font-family:'Tajawal','Outfit',sans-serif;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sidebar{left:auto;right:0;}
.sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-row{display:flex;align-items:center;gap:12px;}
.brand-icon{width:42px;height:42px;background:var(--c-gold);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-text h2{font-size:18px;font-weight:800;color:#fff;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.5);}
.nav-section{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:6px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:var(--sidebar-text);font-size:14px;font-weight:500;margin-bottom:2px;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active-text);font-weight:700;}
.nav-icon{font-size:18px;width:24px;text-align:center;}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;}
.user-avatar{width:36px;height:36px;background:var(--c-gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:700;color:#fff;}
.user-role{font-size:11px;color:rgba(255,255,255,0.45);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
[dir="rtl"] .main{margin-left:0;margin-right:var(--sidebar-w);}
.topbar{height:68px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.page-title{font-size:20px;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.tb-btn{background:var(--surface-raised);border:1px solid var(--border);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.tb-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.btn-primary{background:var(--c-green);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.btn-primary:hover{background:var(--c-green-mid);transform:translateY(-1px);}
.content{padding:32px;flex:1;}

/* Filters Bar */
.filters-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--shadow);}
.filter-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px;}
.filter-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;}
.filter-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.filter-input:focus{border-color:var(--c-green);}
.search-wrap{flex:2;min-width:200px;}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
[dir="rtl"] .search-input{padding:9px 36px 9px 12px;}
.search-input:focus{border-color:var(--c-green);}
.search-icon-wrap{position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted);}
[dir="rtl"] .search-icon{left:auto;right:10px;}

/* Stats Strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.strip-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
.strip-icon{font-size:24px;}
.strip-value{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.strip-label{font-size:12px;color:var(--text-muted);}

/* Table */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.table-header{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-title{font-size:15px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:12px 16px;text-align:left;background:var(--surface-raised);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
[dir="rtl"] th{text-align:right;}
th:hover{color:var(--c-green);}
td{font-size:14px;padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface-raised);}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-active{background:#E8F5EE;color:#1A8A4A;}
.badge-delayed{background:#FEF3E0;color:#B8681A;}
.badge-cancelled{background:#FDE8E8;color:#C0392B;}
.badge-scheduled{background:#EBF4FB;color:#2980B9;}
[data-theme="dark"] .badge-active{background:rgba(26,138,74,0.2);}
[data-theme="dark"] .badge-delayed{background:rgba(184,104,26,0.2);}
[data-theme="dark"] .badge-cancelled{background:rgba(192,57,43,0.2);}
[data-theme="dark"] .badge-scheduled{background:rgba(41,128,185,0.2);}
.action-btns{display:flex;gap:6px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface-raised);color:var(--text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.icon-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.icon-btn.danger:hover{border-color:#C0392B;color:#C0392B;}
.train-id{font-family:'Courier New',monospace;font-size:12px;background:var(--c-green-pale);color:var(--c-green);padding:3px 8px;border-radius:6px;font-weight:700;}
[data-theme="dark"] .train-id{background:rgba(0,102,51,0.2);}
.route-cell{display:flex;align-items:center;gap:8px;}
.route-arrow{color:var(--c-gold);font-weight:700;}
.time-cell{font-weight:700;color:var(--c-green);font-size:15px;}
.duration-badge{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text-muted);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--border);}
.page-info{font-size:13px;color:var(--text-muted);}
.page-btns{display:flex;gap:6px;}
.page-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface-raised);color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.page-btn:hover,.page-btn.active{background:var(--c-green);color:#fff;border-color:var(--c-green);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px;width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--surface-raised);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{background:#FDE8E8;border-color:#C0392B;color:#C0392B;}
.modal-body{padding:24px 28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.form-input,.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus{border-color:var(--c-green);box-shadow:0 0 0 3px rgba(0,102,51,0.1);}
.modal-footer{padding:16px 28px 24px;display:flex;gap:12px;justify-content:flex-end;}
.btn-secondary{background:var(--surface-raised);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--c-green);color:var(--c-green);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--c-green);color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;display:none;align-items:center;gap:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,102,51,0.3);animation:slideUp 0.3s ease;}
[dir="rtl"] .toast{right:auto;left:24px;}
.toast.show{display:flex;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Sidebar icon-only brand */
.sb{width:var(--sidebar-w,260px);min-height:100vh;background:var(--sidebar-bg,#004D26);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sb{left:auto;right:0;}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;}
.sb-ic{width:38px;height:38px;background:#C9A84C;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-nav{padding:12px 8px 8px;flex:1;overflow-y:auto;}
.sbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.30);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin:12px 0 4px;}
.sbi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .2s;text-decoration:none;color:rgba(255,255,255,.78);font-size:13px;font-weight:500;margin-bottom:1px;}
.sbi:hover{background:rgba(255,255,255,.07);color:#fff;}
.sbi.active{background:rgba(201,168,76,.18);color:#C9A84C;font-weight:700;}
.sbi-ic{font-size:16px;width:20px;text-align:center;}
.sb-foot{padding:12px 8px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;}
.sb-av{width:32px;height:32px;background:#C9A84C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:700;color:#fff;}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);}

</style>
</head>
<body>
<nav class="sb">
  <div class="sb-brand"><div class="sb-ic">🚆</div></div>
  <div class="sb-nav" id="sidebar-nav-dyn"></div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">A</div>
      <div><div class="sb-uname" id="sb-name">Admin</div><div class="sb-urole" id="sb-role">Administrator</div></div>
      <div style="color:rgba(255,255,255,0.32);font-size:14px;cursor:pointer;margin-left:auto;" onclick="rwLogout()">↩</div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title" data-i18n="page-title">Schedules</div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="toggleLang()" id="lang-btn">عربي</button>
      <button class="tb-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="btn-primary" onclick="openModal()">
        <span>+</span><span data-i18n="add-schedule">Add Schedule</span>
      </button>
    </div>
  </div>

  <div class="content">
    <div class="stats-strip">
      <div class="strip-card"><div class="strip-icon">📅</div><div><div class="strip-value" id="stat-total">47</div><div class="strip-label" data-i18n="stat-today">Today's Trips</div></div></div>
      <div class="strip-card"><div class="strip-icon">✅</div><div><div class="strip-value" id="stat-active">38</div><div class="strip-label" data-i18n="stat-active">On Time</div></div></div>
      <div class="strip-card"><div class="strip-icon">⚠️</div><div><div class="strip-value" id="stat-delayed">6</div><div class="strip-label" data-i18n="stat-delayed">Delayed</div></div></div>
      <div class="strip-card"><div class="strip-icon">❌</div><div><div class="strip-value" id="stat-cancelled">3</div><div class="strip-label" data-i18n="stat-cancelled">Cancelled</div></div></div>
    </div>

    <div class="filters-bar">
      <div class="filter-group search-wrap">
        <div class="filter-label" data-i18n="search">Search</div>
        <div class="search-icon-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" placeholder="Search trains, routes..." oninput="filterSchedules()">
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-label" data-i18n="filter-route">Route</div>
        <select class="filter-input" id="filter-route" onchange="filterSchedules()">
          <option value="">All Routes</option>
          <option>Riyadh → Jeddah</option>
          <option>Riyadh → Dammam</option>
          <option>Jeddah → Makkah</option>
          <option>Riyadh → Madinah</option>
          <option>Dammam → Jubail</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label" data-i18n="filter-status">Status</div>
        <select class="filter-input" id="filter-status" onchange="filterSchedules()">
          <option value="">All Status</option>
          <option value="active">On Time</option>
          <option value="delayed">Delayed</option>
          <option value="cancelled">Cancelled</option>
          <option value="scheduled">Scheduled</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label" data-i18n="filter-date">Date</div>
        <input type="date" class="filter-input" id="filter-date" onchange="filterSchedules()">
      </div>
      <button class="tb-btn" onclick="clearFilters()" data-i18n="clear-filters">Clear</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title" data-i18n="schedule-list">Schedule List</div>
        <div style="font-size:13px;color:var(--text-muted);" id="result-count">47 schedules</div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th data-i18n="th-id">Train ID</th>
              <th data-i18n="th-route">Route</th>
              <th data-i18n="th-departure">Departure</th>
              <th data-i18n="th-arrival">Arrival</th>
              <th data-i18n="th-duration">Duration</th>
              <th data-i18n="th-seats">Seats</th>
              <th data-i18n="th-class">Class</th>
              <th data-i18n="th-status">Status</th>
              <th data-i18n="th-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="schedule-table-body"></tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="page-info" id="page-info">Showing 1–10 of 47</div>
        <div class="page-btns">
          <button class="page-btn" onclick="changePage(-1)">‹</button>
          <button class="page-btn active" id="page-1">1</button>
          <button class="page-btn" id="page-2" onclick="goPage(2)">2</button>
          <button class="page-btn" id="page-3" onclick="goPage(3)">3</button>
          <button class="page-btn" onclick="changePage(1)">›</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title" data-i18n="modal-add">Add New Schedule</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" data-i18n="ml-train-id">Train ID</label>
          <input type="text" class="form-input" id="m-train-id" placeholder="e.g. IR-401">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="ml-class">Class</label>
          <select class="form-select" id="m-class">
            <option>First Class</option>
            <option>Economy</option>
            <option>Student</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" data-i18n="ml-from">From Station</label>
          <select class="form-select" id="m-from">
            <option>Riyadh</option><option>Jeddah</option><option>Dammam</option><option>Makkah</option><option>Madinah</option><option>Jubail</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="ml-to">To Station</label>
          <select class="form-select" id="m-to">
            <option>Jeddah</option><option>Riyadh</option><option>Dammam</option><option>Makkah</option><option>Madinah</option><option>Jubail</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" data-i18n="ml-dep-time">Departure Time</label>
          <input type="time" class="form-input" id="m-dep-time" value="08:00">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="ml-arr-time">Arrival Time</label>
          <input type="time" class="form-input" id="m-arr-time" value="13:30">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" data-i18n="ml-date">Date</label>
          <input type="date" class="form-input" id="m-date">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="ml-seats">Total Seats</label>
          <input type="number" class="form-input" id="m-seats" value="200" min="1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="ml-status">Status</label>
        <select class="form-select" id="m-status">
          <option value="scheduled">Scheduled</option>
          <option value="active">Active / On Time</option>
          <option value="delayed">Delayed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()" data-i18n="cancel">Cancel</button>
      <button class="btn-primary" onclick="saveSchedule()" data-i18n="save-schedule">Save Schedule</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ <span id="toast-msg">Schedule saved!</span></div>

<script>
let currentLang=localStorage.getItem('rw-lang')||'en';
let currentTheme=localStorage.getItem('rw-theme')||'light';
let editingId=null;
let currentPage=1;
const perPage=8;

const i18n={
  en:{'nav-main':'Main','nav-home':'Home','nav-dashboard':'Dashboard','nav-ops':'Operations','nav-schedules':'Schedules','nav-routes':'Routes','nav-occupancy':'Occupancy','nav-passenger':'Passenger','nav-booking':'Book Ticket','nav-history':'History','nav-admin':'Admin','nav-users':'Users','page-title':'Schedules','add-schedule':'Add Schedule','stat-today':'Today\'s Trips','stat-active':'On Time','stat-delayed':'Delayed','stat-cancelled':'Cancelled','search':'Search','filter-route':'Route','filter-status':'Status','filter-date':'Date','clear-filters':'Clear','schedule-list':'Schedule List','th-id':'Train ID','th-route':'Route','th-departure':'Departure','th-arrival':'Arrival','th-duration':'Duration','th-seats':'Available','th-class':'Class','th-status':'Status','th-actions':'Actions','modal-add':'Add New Schedule','modal-edit':'Edit Schedule','ml-train-id':'Train ID','ml-class':'Class','ml-from':'From Station','ml-to':'To Station','ml-dep-time':'Departure Time','ml-arr-time':'Arrival Time','ml-date':'Date','ml-seats':'Total Seats','ml-status':'Status','cancel':'Cancel','save-schedule':'Save Schedule','toast-saved':'Schedule saved successfully!','toast-deleted':'Schedule deleted.','lang-btn':'عربي'},
  ar:{'nav-main':'الرئيسية','nav-home':'الرئيسية','nav-dashboard':'لوحة التحكم','nav-ops':'العمليات','nav-schedules':'الجداول','nav-routes':'المسارات','nav-occupancy':'الإشغال','nav-passenger':'الركاب','nav-booking':'حجز تذكرة','nav-history':'السجل','nav-admin':'الإدارة','nav-users':'المستخدمون','page-title':'جداول الرحلات','add-schedule':'إضافة جدول','stat-today':'رحلات اليوم','stat-active':'في الموعد','stat-delayed':'متأخرة','stat-cancelled':'ملغاة','search':'بحث','filter-route':'المسار','filter-status':'الحالة','filter-date':'التاريخ','clear-filters':'مسح','schedule-list':'قائمة الجداول','th-id':'رقم القطار','th-route':'المسار','th-departure':'المغادرة','th-arrival':'الوصول','th-duration':'المدة','th-seats':'المقاعد المتاحة','th-class':'الدرجة','th-status':'الحالة','th-actions':'إجراءات','modal-add':'إضافة جدول جديد','modal-edit':'تعديل الجدول','ml-train-id':'رقم القطار','ml-class':'الدرجة','ml-from':'محطة الانطلاق','ml-to':'محطة الوصول','ml-dep-time':'وقت المغادرة','ml-arr-time':'وقت الوصول','ml-date':'التاريخ','ml-seats':'إجمالي المقاعد','ml-status':'الحالة','cancel':'إلغاء','save-schedule':'حفظ الجدول','toast-saved':'تم حفظ الجدول بنجاح!','toast-deleted':'تم حذف الجدول.','lang-btn':'English'}
};

const statusLabels={
  en:{active:'On Time',delayed:'Delayed',cancelled:'Cancelled',scheduled:'Scheduled'},
  ar:{active:'في الموعد',delayed:'متأخر',cancelled:'ملغى',scheduled:'مجدول'}
};
const classLabels={en:{'First Class':'First Class','Economy':'Economy','Student':'Student'},ar:{'First Class':'درجة أولى','Economy':'اقتصادي','Student':'طلابي'}};

let schedules=[
  {id:1,trainId:'IR-401',from:'Riyadh',to:'Jeddah',dep:'08:30',arr:'13:30',duration:'5h 00m',available:24,total:200,cls:'First Class',status:'active',date:'2026-05-02'},
  {id:2,trainId:'IR-205',from:'Riyadh',to:'Dammam',dep:'09:15',arr:'11:45',duration:'2h 30m',available:8,total:150,cls:'Economy',status:'active',date:'2026-05-02'},
  {id:3,trainId:'HR-103',from:'Jeddah',to:'Makkah',dep:'10:00',arr:'11:00',duration:'1h 00m',available:0,total:300,cls:'Economy',status:'delayed',date:'2026-05-02'},
  {id:4,trainId:'IR-302',from:'Riyadh',to:'Madinah',dep:'10:45',arr:'16:45',duration:'6h 00m',available:41,total:200,cls:'First Class',status:'active',date:'2026-05-02'},
  {id:5,trainId:'IR-210',from:'Dammam',to:'Riyadh',dep:'11:30',arr:'14:00',duration:'2h 30m',available:0,total:150,cls:'Economy',status:'cancelled',date:'2026-05-02'},
  {id:6,trainId:'HR-201',from:'Makkah',to:'Jeddah',dep:'12:00',arr:'13:00',duration:'1h 00m',available:55,total:300,cls:'Student',status:'active',date:'2026-05-02'},
  {id:7,trainId:'IR-403',from:'Riyadh',to:'Jeddah',dep:'14:00',arr:'19:00',duration:'5h 00m',available:90,total:200,cls:'Economy',status:'scheduled',date:'2026-05-02'},
  {id:8,trainId:'IR-306',from:'Madinah',to:'Riyadh',dep:'15:30',arr:'21:30',duration:'6h 00m',available:12,total:200,cls:'First Class',status:'active',date:'2026-05-02'},
];
let filtered=[...schedules];

function renderTable(){
  const l=currentLang;
  const start=(currentPage-1)*perPage;
  const pageData=filtered.slice(start,start+perPage);
  const tbody=document.getElementById('schedule-table-body');
  tbody.innerHTML=pageData.map(s=>`
    <tr>
      <td><span class="train-id">${s.trainId}</span></td>
      <td><div class="route-cell"><span>${l==='ar'?arStation(s.from):s.from}</span><span class="route-arrow">${l==='ar'?'←':'→'}</span><span>${l==='ar'?arStation(s.to):s.to}</span></div></td>
      <td><span class="time-cell">${s.dep}</span></td>
      <td><span class="time-cell">${s.arr}</span></td>
      <td><span class="duration-badge">${s.duration}</span></td>
      <td><span style="font-weight:700;color:${s.available===0?'#C0392B':s.available<20?'#B8681A':'var(--c-green)'}">${s.available}</span>/<span style="color:var(--text-muted)">${s.total}</span></td>
      <td>${l==='ar'?classLabels.ar[s.cls]||s.cls:s.cls}</td>
      <td><span class="badge badge-${s.status}">${statusLabels[l][s.status]||s.status}</span></td>
      <td>
        <div class="action-btns">
          <button class="icon-btn" onclick="editSchedule(${s.id})" title="Edit">✏️</button>
          <button class="icon-btn danger" onclick="deleteSchedule(${s.id})" title="Delete">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
  document.getElementById('page-info').textContent=l==='ar'?`عرض ${start+1}–${Math.min(start+perPage,filtered.length)} من ${filtered.length}`:`Showing ${start+1}–${Math.min(start+perPage,filtered.length)} of ${filtered.length}`;
  document.getElementById('result-count').textContent=l==='ar'?`${filtered.length} جدول`:`${filtered.length} schedules`;
}

const arStations={Riyadh:'الرياض',Jeddah:'جدة',Dammam:'الدمام',Makkah:'مكة',Madinah:'المدينة',Jubail:'الجبيل'};
function arStation(s){return arStations[s]||s;}

function filterSchedules(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const route=document.getElementById('filter-route').value;
  const status=document.getElementById('filter-status').value;
  const date=document.getElementById('filter-date').value;
  filtered=schedules.filter(s=>{
    const matchQ=!q||(s.trainId+s.from+s.to).toLowerCase().includes(q);
    const matchRoute=!route||(s.from+' → '+s.to)===route;
    const matchStatus=!status||s.status===status;
    const matchDate=!date||s.date===date;
    return matchQ&&matchRoute&&matchStatus&&matchDate;
  });
  currentPage=1;renderTable();
}
function clearFilters(){document.getElementById('search-input').value='';document.getElementById('filter-route').value='';document.getElementById('filter-status').value='';document.getElementById('filter-date').value='';filtered=[...schedules];currentPage=1;renderTable();}
function changePage(d){const maxP=Math.ceil(filtered.length/perPage);currentPage=Math.max(1,Math.min(maxP,currentPage+d));renderTable();}
function goPage(p){currentPage=p;renderTable();}

function openModal(editing=false){document.getElementById('modal').classList.add('open');if(!editing){document.getElementById('m-train-id').value='';document.getElementById('m-from').value='Riyadh';document.getElementById('m-to').value='Jeddah';document.getElementById('m-dep-time').value='08:00';document.getElementById('m-arr-time').value='13:30';document.getElementById('m-seats').value='200';document.getElementById('m-status').value='scheduled';const today=new Date().toISOString().split('T')[0];document.getElementById('m-date').value=today;}}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function editSchedule(id){
  const s=schedules.find(x=>x.id===id);if(!s)return;
  editingId=id;
  document.getElementById('m-train-id').value=s.trainId;document.getElementById('m-from').value=s.from;document.getElementById('m-to').value=s.to;document.getElementById('m-dep-time').value=s.dep;document.getElementById('m-arr-time').value=s.arr;document.getElementById('m-seats').value=s.total;document.getElementById('m-status').value=s.status;document.getElementById('m-date').value=s.date;document.getElementById('m-class').value=s.cls;
  document.getElementById('modal-title').textContent=i18n[currentLang]['modal-edit'];
  openModal(true);
}
function saveSchedule(){
  const trainId=document.getElementById('m-train-id').value.trim();
  if(!trainId)return;
  const dep=document.getElementById('m-dep-time').value;const arr=document.getElementById('m-arr-time').value;
  const depH=parseInt(dep),arrH=parseInt(arr);const diff=(arrH-depH+24)%24;
  const duration=diff+'h 00m';
  if(editingId){
    const idx=schedules.findIndex(x=>x.id===editingId);
    schedules[idx]={...schedules[idx],trainId,from:document.getElementById('m-from').value,to:document.getElementById('m-to').value,dep,arr,duration,total:parseInt(document.getElementById('m-seats').value),available:parseInt(document.getElementById('m-seats').value)-Math.floor(Math.random()*50),cls:document.getElementById('m-class').value,status:document.getElementById('m-status').value,date:document.getElementById('m-date').value};
  }else{
    schedules.unshift({id:Date.now(),trainId,from:document.getElementById('m-from').value,to:document.getElementById('m-to').value,dep,arr,duration,total:parseInt(document.getElementById('m-seats').value),available:parseInt(document.getElementById('m-seats').value),cls:document.getElementById('m-class').value,status:document.getElementById('m-status').value,date:document.getElementById('m-date').value});
  }
  filtered=[...schedules];renderTable();closeModal();showToast(i18n[currentLang]['toast-saved']);
}
function deleteSchedule(id){
  if(confirm(currentLang==='ar'?'هل أنت متأكد من الحذف؟':'Are you sure you want to delete this schedule?')){
    schedules=schedules.filter(x=>x.id!==id);filtered=[...schedules];renderTable();showToast(i18n[currentLang]['toast-deleted']);
  }
}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function applyTheme(t){currentTheme=t;localStorage.setItem('rw-theme',t);document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){applyTheme(currentTheme==='light'?'dark':'light');}
function applyLang(lang){currentLang=lang;localStorage.setItem('rw-lang',lang);document.documentElement.setAttribute('lang',lang);document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k])el.textContent=i18n[lang][k];});document.getElementById('lang-btn').textContent=i18n[lang]['lang-btn'];renderTable();}
function toggleLang(){applyLang(currentLang==='en'?'ar':'en');}

const user=JSON.parse(localStorage.getItem('rw-user')||'{"email":"admin@railwaysa.com","role":"admin"}');
document.getElementById('user-avatar').textContent=user.email[0].toUpperCase();
document.getElementById('user-name').textContent=user.email.split('@')[0];
document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
applyTheme(currentTheme);applyLang(currentLang);

// Role guard — redirect if not admin or staff
(function(){
  const u = JSON.parse(localStorage.getItem('rw-user') || '{"role":"passenger"}');
  if(u.role === 'passenger') window.location.href = 'home-passenger.html';
  // Update Home link dynamically
  const homeLinks = document.querySelectorAll('a[href="home-admin.html"]');
  homeLinks.forEach(l => {
    if(u.role === 'staff') l.href = 'home-staff.html';
  });
})();

// Dynamic sidebar nav based on role
(function(){
  var u=window.RW_USER||{};
  var el=document.getElementById('sidebar-nav-dyn');
  if(!el)return;
  if(u.role==='admin'){
    el.innerHTML=`    <div class="sbl">Main</div>
    <a href="home-admin.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="dashboard.html" class="sbi "><span class="sbi-ic">📊</span><span>Dashboard</span></a>
    <div class="sbl">Operations</div>
    <a href="schedules.html" class="sbi active"><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="routes.html" class="sbi "><span class="sbi-ic">🗺️</span><span>Routes</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <div class="sbl">Management</div>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>
    <a href="users.html" class="sbi "><span class="sbi-ic">👥</span><span>Users</span></a>`;
  }else{
    el.innerHTML=`    <div class="sbl">Operations</div>
    <a href="home-staff.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="schedules.html" class="sbi active"><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>`;
  }
})();
</script>
</body>
</html>
