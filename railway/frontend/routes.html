<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailWay SA — Routes</title>
<script>var PAGE_ROLES=["admin","staff"];</script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--c-green:#006633;--c-green-dark:#004D26;--c-green-mid:#00853D;--c-green-light:#CCE8D9;--c-green-pale:#EFF7F2;--c-gold:#C9A84C;--c-gold-light:#F5E9C6;--bg:#F2F5F3;--surface:#FFFFFF;--surface-raised:#F8FBF9;--border:#D8E5DD;--text-primary:#112218;--text-secondary:#4A6858;--text-muted:#7A9888;--shadow:0 2px 12px rgba(0,102,51,0.08);--shadow-md:0 4px 24px rgba(0,102,51,0.12);--radius:14px;--sidebar-w:260px;--sidebar-bg:#004D26;--sidebar-text:rgba(255,255,255,0.8);--sidebar-hover:rgba(255,255,255,0.07);--sidebar-active-bg:rgba(201,168,76,0.18);--sidebar-active-text:#C9A84C;}
[data-theme="dark"]{--bg:#0A1610;--surface:#142218;--surface-raised:#1C2E20;--border:#2A4030;--text-primary:#E0EFE6;--text-secondary:#8AB898;--text-muted:#5A7A68;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-md:0 4px 24px rgba(0,0,0,0.4);--sidebar-bg:#0A1610;--sidebar-hover:rgba(255,255,255,0.05);--sidebar-active-bg:rgba(201,168,76,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit','Tajawal',sans-serif;background:var(--bg);color:var(--text-primary);display:flex;min-height:100vh;transition:background 0.3s,color 0.3s;}
[dir="rtl"]{font-family:'Tajawal','Outfit',sans-serif;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sidebar{left:auto;right:0;}
.sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-row{display:flex;align-items:center;gap:12px;}
.brand-icon{width:42px;height:42px;background:var(--c-gold);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-text h2{font-size:18px;font-weight:800;color:#fff;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.5);}
.nav-section{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:6px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:var(--sidebar-text);font-size:14px;font-weight:500;margin-bottom:2px;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active-text);font-weight:700;}
.nav-icon{font-size:18px;width:24px;text-align:center;}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;}
.user-avatar{width:36px;height:36px;background:var(--c-gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:700;color:#fff;}
.user-role{font-size:11px;color:rgba(255,255,255,0.45);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
[dir="rtl"] .main{margin-left:0;margin-right:var(--sidebar-w);}
.topbar{height:68px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.page-title{font-size:20px;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.tb-btn{background:var(--surface-raised);border:1px solid var(--border);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.tb-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.btn-primary{background:var(--c-green);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-primary:hover{background:var(--c-green-mid);}
.content{padding:32px;flex:1;}

/* Pricing Banner */
.pricing-note{background:linear-gradient(135deg,var(--c-green-dark),var(--c-green));border-radius:16px;padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;}
.pn-text h3{color:#fff;font-size:17px;font-weight:800;margin-bottom:4px;}
.pn-text p{color:rgba(255,255,255,0.75);font-size:13px;}
.pn-badges{display:flex;gap:10px;}
.pn-badge{background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--c-gold);font-weight:700;}

/* Routes Grid */
.routes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:32px;}
.route-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:all 0.2s;position:relative;overflow:hidden;}
.route-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;}
.route-card.route-a::before{background:linear-gradient(90deg,var(--c-green),var(--c-gold));}
.route-card.route-b::before{background:linear-gradient(90deg,var(--c-gold),var(--c-green));}
.route-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.route-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.route-id-badge{font-family:'Courier New',monospace;font-size:11px;font-weight:700;background:var(--c-green-pale);color:var(--c-green);padding:3px 8px;border-radius:5px;}
[data-theme="dark"] .route-id-badge{background:rgba(0,102,51,0.2);}
.route-active-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.active-yes{background:#E8F5EE;color:#1A8A4A;}
.active-no{background:#FDE8E8;color:#C0392B;}
[data-theme="dark"] .active-yes{background:rgba(26,138,74,0.2);}
[data-theme="dark"] .active-no{background:rgba(192,57,43,0.2);}
.route-stations{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.station-node{text-align:center;}
.station-dot{width:12px;height:12px;border-radius:50%;background:var(--c-green);margin:0 auto 4px;}
.station-dot.end{background:var(--c-gold);}
.station-name{font-size:15px;font-weight:800;}
.station-code{font-size:10px;color:var(--text-muted);}
.route-line-visual{flex:1;height:2px;background:linear-gradient(90deg,var(--c-green),var(--c-gold));position:relative;}
.route-line-visual::before{content:'🚆';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:16px;}
.route-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.meta-item{text-align:center;}
.meta-val{font-size:16px;font-weight:800;color:var(--c-green);}
.meta-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
.route-pricing{background:var(--c-gold-light);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
[data-theme="dark"] .route-pricing{background:rgba(201,168,76,0.12);}
.pricing-title{font-size:11px;font-weight:700;color:var(--c-gold-dark);margin-bottom:4px;}
.pricing-tiers{display:flex;gap:10px;}
.tier{font-size:12px;font-weight:700;color:var(--text-secondary);}
.tier strong{color:var(--c-green);}
.route-actions{display:flex;gap:8px;}
.route-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--surface-raised);font-size:12px;font-weight:700;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:center;}
.route-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.route-btn.view{background:var(--c-green);color:#fff;border-color:var(--c-green);}

/* Map Placeholder */
.map-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;box-shadow:var(--shadow);overflow:hidden;margin-bottom:28px;}
.map-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.map-title{font-size:15px;font-weight:700;}
.map-visual{background:linear-gradient(135deg,#E8F5EE 0%,#EFF7F2 100%);height:320px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
[data-theme="dark"] .map-visual{background:linear-gradient(135deg,rgba(0,102,51,0.1) 0%,rgba(0,77,38,0.2) 100%);}
.map-svg{width:100%;height:100%;}

/* Station Table */
.stations-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;}
.stations-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.station-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:11px;padding:16px;text-align:center;transition:all 0.2s;}
.station-card:hover{border-color:var(--c-green);transform:translateY(-2px);}
.station-emoji{font-size:28px;margin-bottom:8px;}
.station-cn{font-size:14px;font-weight:800;}
.station-city{font-size:11px;color:var(--text-muted);margin-top:2px;}
.station-routes{font-size:11px;color:var(--c-green);font-weight:600;margin-top:6px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--surface-raised);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#FDE8E8;color:#C0392B;}
.modal-body{padding:24px 28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.form-input,.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus{border-color:var(--c-green);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end;}
.btn-s{background:var(--surface-raised);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--c-green);color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;display:none;align-items:center;gap:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,102,51,0.3);}
[dir="rtl"] .toast{right:auto;left:24px;}
.toast.show{display:flex;}
@media(max-width:900px){.routes-grid{grid-template-columns:1fr;}.stations-grid{grid-template-columns:repeat(2,1fr);}}

/* Sidebar icon-only brand */
.sb{width:var(--sidebar-w,260px);min-height:100vh;background:var(--sidebar-bg,#004D26);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sb{left:auto;right:0;}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;}
.sb-ic{width:38px;height:38px;background:#C9A84C;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-nav{padding:12px 8px 8px;flex:1;overflow-y:auto;}
.sbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.30);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin:12px 0 4px;}
.sbi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .2s;text-decoration:none;color:rgba(255,255,255,.78);font-size:13px;font-weight:500;margin-bottom:1px;}
.sbi:hover{background:rgba(255,255,255,.07);color:#fff;}
.sbi.active{background:rgba(201,168,76,.18);color:#C9A84C;font-weight:700;}
.sbi-ic{font-size:16px;width:20px;text-align:center;}
.sb-foot{padding:12px 8px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;}
.sb-av{width:32px;height:32px;background:#C9A84C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:700;color:#fff;}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);}

</style>
</head>
<body>
<nav class="sb">
  <div class="sb-brand"><div class="sb-ic">🚆</div></div>
  <div class="sb-nav" id="sidebar-nav-dyn"></div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">A</div>
      <div><div class="sb-uname" id="sb-name">Admin</div><div class="sb-urole" id="sb-role">Administrator</div></div>
      <div style="color:rgba(255,255,255,0.32);font-size:14px;cursor:pointer;margin-left:auto;" onclick="rwLogout()">↩</div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title" data-i18n="page-title">Routes & Stations</div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="toggleLang()" id="lang-btn">عربي</button>
      <button class="tb-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="btn-primary" onclick="openModal()">+ <span data-i18n="add-route">Add Route</span></button>
    </div>
  </div>
  <div class="content">

    <div class="pricing-note">
      <div class="pn-text"><h3 data-i18n="pricing-title">Route Pricing is Dynamic</h3><p data-i18n="pricing-desc">Prices are set per route by admins and automatically applied to all bookings. Season pricing multipliers can be configured.</p></div>
      <div class="pn-badges"><span class="pn-badge">⚙️ Admin Controlled</span><span class="pn-badge">📊 Data Driven</span></div>
    </div>

    <div id="routes-grid" class="routes-grid"></div>

    <div class="map-card">
      <div class="map-header"><div class="map-title" data-i18n="network-map">Railway Network Map</div></div>
      <div class="map-visual">
        <svg class="map-svg" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
          <!-- Saudi Arabia rough outline -->
          <rect x="0" y="0" width="800" height="300" fill="transparent"/>
          <!-- Route lines -->
          <line x1="300" y1="160" x2="150" y2="210" stroke="#C9A84C" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
          <line x1="300" y1="160" x2="550" y2="140" stroke="#006633" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
          <line x1="300" y1="160" x2="200" y2="80" stroke="#006633" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
          <line x1="150" y1="210" x2="100" y2="200" stroke="#C9A84C" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
          <line x1="300" y1="160" x2="400" y2="220" stroke="#006633" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
          <!-- Station nodes -->
          <circle cx="300" cy="160" r="14" fill="#006633" opacity="0.9"/>
          <text x="300" y="185" text-anchor="middle" font-size="11" fill="#4A6858" font-weight="700" font-family="Outfit,sans-serif">Riyadh</text>
          <circle cx="150" cy="210" r="11" fill="#C9A84C" opacity="0.9"/>
          <text x="150" y="232" text-anchor="middle" font-size="10" fill="#4A6858" font-weight="700" font-family="Outfit,sans-serif">Jeddah</text>
          <circle cx="100" cy="200" r="9" fill="#00853D" opacity="0.8"/>
          <text x="100" y="220" text-anchor="middle" font-size="10" fill="#4A6858" font-weight="600" font-family="Outfit,sans-serif">Makkah</text>
          <circle cx="200" cy="80" r="10" fill="#00853D" opacity="0.8"/>
          <text x="200" y="100" text-anchor="middle" font-size="10" fill="#4A6858" font-weight="600" font-family="Outfit,sans-serif">Madinah</text>
          <circle cx="550" cy="140" r="10" fill="#C9A84C" opacity="0.9"/>
          <text x="550" y="160" text-anchor="middle" font-size="10" fill="#4A6858" font-weight="600" font-family="Outfit,sans-serif">Dammam</text>
          <circle cx="400" cy="220" r="8" fill="#004D26" opacity="0.7"/>
          <text x="400" y="240" text-anchor="middle" font-size="9" fill="#4A6858" font-weight="600" font-family="Outfit,sans-serif">Jubail</text>
          <!-- Train icons on routes -->
          <text x="225" y="195" font-size="16" opacity="0.6">🚆</text>
          <text x="420" y="145" font-size="16" opacity="0.6">🚆</text>
          <text x="230" y="120" font-size="14" opacity="0.5">🚆</text>
          <!-- Legend -->
          <line x1="620" y1="40" x2="650" y2="40" stroke="#006633" stroke-width="3" stroke-dasharray="6,3"/>
          <text x="660" y="44" font-size="11" fill="#4A6858" font-family="Outfit,sans-serif">Active Route</text>
          <line x1="620" y1="60" x2="650" y2="60" stroke="#C9A84C" stroke-width="3" stroke-dasharray="6,3"/>
          <text x="660" y="64" font-size="11" fill="#4A6858" font-family="Outfit,sans-serif">High Traffic</text>
        </svg>
      </div>
    </div>

    <div class="stations-card">
      <div class="card-header"><div class="card-title" data-i18n="stations-title">All Stations</div><button class="btn-primary" onclick="openStationModal()" style="font-size:13px;padding:8px 16px;">+ <span data-i18n="add-station">Add Station</span></button></div>
      <div class="stations-grid" id="stations-grid"></div>
    </div>

  </div>
</div>

<!-- Route Modal -->
<div class="modal-overlay" id="route-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" data-i18n="add-route-title">Add New Route</div><button class="modal-close" onclick="closeRouteModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-id">Route ID</label><input type="text" class="form-input" id="r-id" placeholder="e.g. RT-007"></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-status">Status</label><select class="form-select" id="r-status"><option value="true">Active</option><option value="false">Inactive</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-from">From Station</label><select class="form-select" id="r-from"><option>Riyadh</option><option>Jeddah</option><option>Dammam</option><option>Makkah</option><option>Madinah</option><option>Jubail</option></select></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-to">To Station</label><select class="form-select" id="r-to"><option>Jeddah</option><option>Riyadh</option><option>Dammam</option><option>Makkah</option><option>Madinah</option><option>Jubail</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-distance">Distance (km)</label><input type="number" class="form-input" id="r-dist" placeholder="e.g. 980"></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-duration">Duration (hrs)</label><input type="number" class="form-input" id="r-dur" step="0.5" placeholder="e.g. 5.0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-price-fc">First Class (SAR)</label><input type="number" class="form-input" id="r-pfc" placeholder="350"></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-price-ec">Economy (SAR)</label><input type="number" class="form-input" id="r-pec" placeholder="180"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="ml-price-st">Student (SAR)</label><input type="number" class="form-input" id="r-pst" placeholder="90"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-s" onclick="closeRouteModal()" data-i18n="cancel">Cancel</button>
      <button class="btn-primary" onclick="saveRoute()" data-i18n="save-route">Save Route</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">✅ <span id="toast-msg">Saved!</span></div>

<script>
let currentLang=localStorage.getItem('rw-lang')||'en';
let currentTheme=localStorage.getItem('rw-theme')||'light';
const i18n={en:{'nav-main':'Main','nav-home':'Home','nav-dashboard':'Dashboard','nav-ops':'Operations','nav-schedules':'Schedules','nav-routes':'Routes','nav-occupancy':'Occupancy','nav-passenger':'Passenger','nav-booking':'Book Ticket','nav-history':'History','nav-admin':'Admin','nav-users':'Users','page-title':'Routes & Stations','add-route':'Add Route','pricing-title':'Route Pricing is Dynamic','pricing-desc':'Prices are set per route by admins and automatically applied to all bookings.','network-map':'Railway Network Map','stations-title':'All Stations','add-station':'Add Station','add-route-title':'Add New Route','ml-id':'Route ID','ml-status':'Status','ml-from':'From Station','ml-to':'To Station','ml-distance':'Distance (km)','ml-duration':'Duration (hrs)','ml-price-fc':'First Class (SAR)','ml-price-ec':'Economy (SAR)','ml-price-st':'Student (SAR)','cancel':'Cancel','save-route':'Save Route','lang-btn':'عربي'},ar:{'nav-main':'الرئيسية','nav-home':'الرئيسية','nav-dashboard':'لوحة التحكم','nav-ops':'العمليات','nav-schedules':'الجداول','nav-routes':'المسارات','nav-occupancy':'الإشغال','nav-passenger':'الركاب','nav-booking':'حجز تذكرة','nav-history':'السجل','nav-admin':'الإدارة','nav-users':'المستخدمون','page-title':'المسارات والمحطات','add-route':'إضافة مسار','pricing-title':'التسعير الديناميكي للمسارات','pricing-desc':'يُحدد السعر لكل مسار من قِبل المدير وتُطبَّق تلقائياً على جميع الحجوزات.','network-map':'خريطة شبكة السكك الحديدية','stations-title':'جميع المحطات','add-station':'إضافة محطة','add-route-title':'إضافة مسار جديد','ml-id':'رقم المسار','ml-status':'الحالة','ml-from':'محطة البداية','ml-to':'محطة الوصول','ml-distance':'المسافة (كم)','ml-duration':'المدة (ساعات)','ml-price-fc':'درجة أولى (ريال)','ml-price-ec':'اقتصادي (ريال)','ml-price-st':'طلابي (ريال)','cancel':'إلغاء','save-route':'حفظ المسار','lang-btn':'English'}};
const arSt={Riyadh:'الرياض',Jeddah:'جدة',Dammam:'الدمام',Makkah:'مكة',Madinah:'المدينة',Jubail:'الجبيل'};

let routes=[
  {id:'RT-001',from:'Riyadh',to:'Jeddah',distance:980,duration:5,active:true,prices:{fc:350,ec:180,st:90},trips:342,load:84},
  {id:'RT-002',from:'Riyadh',to:'Dammam',distance:400,duration:2.5,active:true,prices:{fc:220,ec:120,st:60},trips:285,load:72},
  {id:'RT-003',from:'Jeddah',to:'Makkah',distance:80,duration:1,active:true,prices:{fc:120,ec:50,st:30},trips:410,load:91},
  {id:'RT-004',from:'Riyadh',to:'Madinah',distance:1200,duration:6,active:true,prices:{fc:420,ec:250,st:120},trips:198,load:68},
  {id:'RT-005',from:'Dammam',to:'Jubail',distance:100,duration:1,active:false,prices:{fc:150,ec:80,st:40},trips:124,load:45},
];
const stations=[
  {emoji:'🏙️',name:'Riyadh Central',city:{en:'Riyadh',ar:'الرياض'},routes:4},
  {emoji:'🌊',name:'Jeddah North',city:{en:'Jeddah',ar:'جدة'},routes:3},
  {emoji:'🕌',name:'Makkah Station',city:{en:'Makkah',ar:'مكة'},routes:2},
  {emoji:'🌴',name:'Madinah Station',city:{en:'Madinah',ar:'المدينة'},routes:2},
  {emoji:'⚓',name:'Dammam Port',city:{en:'Dammam',ar:'الدمام'},routes:2},
  {emoji:'🏭',name:'Jubail Industrial',city:{en:'Jubail',ar:'الجبيل'},routes:1},
];

function stn(n){return currentLang==='ar'?(arSt[n]||n):n;}

function renderRoutes(){
  const l=currentLang;
  document.getElementById('routes-grid').innerHTML=routes.map((r,i)=>`
    <div class="route-card route-${i%2===0?'a':'b'}">
      <div class="route-header">
        <span class="route-id-badge">${r.id}</span>
        <span class="route-active-badge ${r.active?'active-yes':'active-no'}">${r.active?(l==='ar'?'نشط':'Active'):(l==='ar'?'غير نشط':'Inactive')}</span>
      </div>
      <div class="route-stations">
        <div class="station-node"><div class="station-dot"></div><div class="station-name">${stn(r.from)}</div><div class="station-code">${r.from.substring(0,3).toUpperCase()}</div></div>
        <div class="route-line-visual"></div>
        <div class="station-node"><div class="station-dot end"></div><div class="station-name">${stn(r.to)}</div><div class="station-code">${r.to.substring(0,3).toUpperCase()}</div></div>
      </div>
      <div class="route-meta">
        <div class="meta-item"><div class="meta-val">${r.distance} <span style="font-size:12px;font-weight:500;">km</span></div><div class="meta-label">${l==='ar'?'المسافة':'Distance'}</div></div>
        <div class="meta-item"><div class="meta-val">${r.duration}h</div><div class="meta-label">${l==='ar'?'المدة':'Duration'}</div></div>
        <div class="meta-item"><div class="meta-val">${r.load}%</div><div class="meta-label">${l==='ar'?'إشغال':'Load'}</div></div>
      </div>
      <div class="route-pricing">
        <div><div class="pricing-title">${l==='ar'?'التسعير':'Pricing'}</div>
        <div class="pricing-tiers">
          <span class="tier">${l==='ar'?'أول:':'FC:'} <strong>SAR ${r.prices.fc}</strong></span>
          <span class="tier">${l==='ar'?'اقت:':'EC:'} <strong>SAR ${r.prices.ec}</strong></span>
          <span class="tier">${l==='ar'?'طلا:':'ST:'} <strong>SAR ${r.prices.st}</strong></span>
        </div>
        </div>
        <div style="text-align:right;"><div style="font-size:20px;font-weight:800;color:var(--c-gold);">${r.trips}</div><div style="font-size:10px;color:var(--text-muted);">${l==='ar'?'رحلة':'trips'}</div></div>
      </div>
      <div class="route-actions">
        <button class="route-btn view" onclick="editRoute(${i})">${l==='ar'?'تعديل':'Edit'}</button>
        <button class="route-btn" onclick="toggleRouteStatus(${i})">${r.active?(l==='ar'?'تعطيل':'Deactivate'):(l==='ar'?'تفعيل':'Activate')}</button>
        <button class="route-btn" style="border-color:#C0392B;color:#C0392B;" onclick="deleteRoute(${i})">${l==='ar'?'حذف':'Delete'}</button>
      </div>
    </div>`).join('');
}

function renderStations(){
  const l=currentLang;
  document.getElementById('stations-grid').innerHTML=stations.map(s=>`
    <div class="station-card">
      <div class="station-emoji">${s.emoji}</div>
      <div class="station-cn">${s.name}</div>
      <div class="station-city">${s.city[l]}</div>
      <div class="station-routes">${s.routes} ${l==='ar'?'مسارات':'routes'}</div>
    </div>`).join('');
}

function openModal(){document.getElementById('route-modal').classList.add('open');}
function closeRouteModal(){document.getElementById('route-modal').classList.remove('open');}
function openStationModal(){alert(currentLang==='ar'?'ميزة إضافة المحطات قيد التطوير':'Add station feature coming soon!');}

function saveRoute(){
  const id=document.getElementById('r-id').value.trim();if(!id)return;
  routes.push({id,from:document.getElementById('r-from').value,to:document.getElementById('r-to').value,distance:parseInt(document.getElementById('r-dist').value)||0,duration:parseFloat(document.getElementById('r-dur').value)||0,active:document.getElementById('r-status').value==='true',prices:{fc:parseInt(document.getElementById('r-pfc').value)||0,ec:parseInt(document.getElementById('r-pec').value)||0,st:parseInt(document.getElementById('r-pst').value)||0},trips:0,load:0});
  renderRoutes();closeRouteModal();showToast(currentLang==='ar'?'تم حفظ المسار!':'Route saved!');
}

function editRoute(i){
  const r=routes[i];
  document.getElementById('r-id').value=r.id;document.getElementById('r-from').value=r.from;document.getElementById('r-to').value=r.to;document.getElementById('r-dist').value=r.distance;document.getElementById('r-dur').value=r.duration;document.getElementById('r-status').value=r.active?'true':'false';document.getElementById('r-pfc').value=r.prices.fc;document.getElementById('r-pec').value=r.prices.ec;document.getElementById('r-pst').value=r.prices.st;
  openModal();
}
function toggleRouteStatus(i){routes[i].active=!routes[i].active;renderRoutes();}
function deleteRoute(i){if(confirm(currentLang==='ar'?'حذف هذا المسار؟':'Delete this route?')){routes.splice(i,1);renderRoutes();}}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function applyTheme(t){currentTheme=t;localStorage.setItem('rw-theme',t);document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){applyTheme(currentTheme==='light'?'dark':'light');}
function applyLang(lang){currentLang=lang;localStorage.setItem('rw-lang',lang);document.documentElement.setAttribute('lang',lang);document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k])el.textContent=i18n[lang][k];});document.getElementById('lang-btn').textContent=i18n[lang]['lang-btn'];renderRoutes();renderStations();}
function toggleLang(){applyLang(currentLang==='en'?'ar':'en');}
const user=JSON.parse(localStorage.getItem('rw-user')||'{"email":"admin@railwaysa.com","role":"admin"}');
document.getElementById('user-avatar').textContent=user.email[0].toUpperCase();
document.getElementById('user-name').textContent=user.email.split('@')[0];
document.getElementById('user-role').textContent=user.role;
applyTheme(currentTheme);applyLang(currentLang);

// Role guard — redirect if not admin or staff
(function(){
  const u = JSON.parse(localStorage.getItem('rw-user') || '{"role":"passenger"}');
  if(u.role === 'passenger') window.location.href = 'home-passenger.html';
  // Update Home link dynamically
  const homeLinks = document.querySelectorAll('a[href="home-admin.html"]');
  homeLinks.forEach(l => {
    if(u.role === 'staff') l.href = 'home-staff.html';
  });
})();

// Dynamic sidebar nav based on role
(function(){
  var u=window.RW_USER||{};
  var el=document.getElementById('sidebar-nav-dyn');
  if(!el)return;
  if(u.role==='admin'){
    el.innerHTML=`    <div class="sbl">Main</div>
    <a href="home-admin.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="dashboard.html" class="sbi "><span class="sbi-ic">📊</span><span>Dashboard</span></a>
    <div class="sbl">Operations</div>
    <a href="schedules.html" class="sbi "><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="routes.html" class="sbi active"><span class="sbi-ic">🗺️</span><span>Routes</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <div class="sbl">Management</div>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>
    <a href="users.html" class="sbi "><span class="sbi-ic">👥</span><span>Users</span></a>`;
  }else{
    el.innerHTML=`    <div class="sbl">Operations</div>
    <a href="home-staff.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="schedules.html" class="sbi "><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>`;
  }
})();
</script>
</body>
</html>
