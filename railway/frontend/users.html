<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailWay SA — Users</title>
<script>var PAGE_ROLES=["admin","staff"];</script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--c-green:#006633;--c-green-dark:#004D26;--c-green-mid:#00853D;--c-green-light:#CCE8D9;--c-green-pale:#EFF7F2;--c-gold:#C9A84C;--c-gold-light:#F5E9C6;--bg:#F2F5F3;--surface:#FFFFFF;--surface-raised:#F8FBF9;--border:#D8E5DD;--text-primary:#112218;--text-secondary:#4A6858;--text-muted:#7A9888;--shadow:0 2px 12px rgba(0,102,51,0.08);--shadow-md:0 4px 24px rgba(0,102,51,0.12);--radius:14px;--sidebar-w:260px;--sidebar-bg:#004D26;--sidebar-text:rgba(255,255,255,0.8);--sidebar-hover:rgba(255,255,255,0.07);--sidebar-active-bg:rgba(201,168,76,0.18);--sidebar-active-text:#C9A84C;}
[data-theme="dark"]{--bg:#0A1610;--surface:#142218;--surface-raised:#1C2E20;--border:#2A4030;--text-primary:#E0EFE6;--text-secondary:#8AB898;--text-muted:#5A7A68;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-md:0 4px 24px rgba(0,0,0,0.4);--sidebar-bg:#0A1610;--sidebar-hover:rgba(255,255,255,0.05);--sidebar-active-bg:rgba(201,168,76,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit','Tajawal',sans-serif;background:var(--bg);color:var(--text-primary);display:flex;min-height:100vh;transition:background 0.3s,color 0.3s;}
[dir="rtl"]{font-family:'Tajawal','Outfit',sans-serif;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sidebar{left:auto;right:0;}
.sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-row{display:flex;align-items:center;gap:12px;}
.brand-icon{width:42px;height:42px;background:var(--c-gold);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-text h2{font-size:18px;font-weight:800;color:#fff;}
.brand-text p{font-size:11px;color:rgba(255,255,255,0.5);}
.nav-section{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:6px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:var(--sidebar-text);font-size:14px;font-weight:500;margin-bottom:2px;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active-text);font-weight:700;}
.nav-icon{font-size:18px;width:24px;text-align:center;}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
.user-card-sb{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;}
.user-avatar-sb{width:36px;height:36px;background:var(--c-gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;}
.user-info-sb{flex:1;}
.user-name-sb{font-size:13px;font-weight:700;color:#fff;}
.user-role-sb{font-size:11px;color:rgba(255,255,255,0.45);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
[dir="rtl"] .main{margin-left:0;margin-right:var(--sidebar-w);}
.topbar{height:68px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.page-title{font-size:20px;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.tb-btn{background:var(--surface-raised);border:1px solid var(--border);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.tb-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.btn-primary{background:var(--c-green);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.btn-primary:hover{background:var(--c-green-mid);}
.content{padding:32px;flex:1;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
.stat-icon{font-size:24px;}
.stat-val{font-size:22px;font-weight:800;}
.stat-label{font-size:12px;color:var(--text-muted);}

/* Filters */
.filters-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;box-shadow:var(--shadow);}
.fg{display:flex;flex-direction:column;gap:6px;min-width:140px;}
.fg label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.fg input,.fg select{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.fg input:focus,.fg select:focus{border-color:var(--c-green);}
.search-fg{flex:2;min-width:200px;}
.si-wrap{position:relative;}
.si-wrap input{width:100%;padding:9px 12px 9px 34px;}
[dir="rtl"] .si-wrap input{padding:9px 34px 9px 12px;}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;}
[dir="rtl"] .si{left:auto;right:10px;}

/* Role Tabs */
.role-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.role-tab{padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.role-tab:hover{border-color:var(--c-green);color:var(--c-green);}
.role-tab.active{background:var(--c-green);color:#fff;border-color:var(--c-green);}
.tab-count{background:rgba(255,255,255,0.25);border-radius:20px;padding:1px 7px;font-size:11px;}
.role-tab:not(.active) .tab-count{background:var(--border);color:var(--text-muted);}

/* User Cards Grid */
.users-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:all 0.2s;position:relative;}
.user-card:hover{box-shadow:var(--shadow-md);border-color:var(--c-green-light);}
.user-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.user-avatar-big{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.avatar-admin{background:linear-gradient(135deg,var(--c-green-dark),var(--c-green));}
.avatar-staff{background:linear-gradient(135deg,var(--c-gold-dark),var(--c-gold));}
.avatar-passenger{background:linear-gradient(135deg,#2980B9,#3498DB);}
.verified-badge{position:absolute;bottom:-4px;right:-4px;width:18px;height:18px;background:#1A8A4A;border-radius:50%;border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
[dir="rtl"] .verified-badge{right:auto;left:-4px;}
.user-card-info{flex:1;overflow:hidden;}
.uc-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uc-email{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uc-role-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.rb-admin{background:var(--c-green-pale);color:var(--c-green);}
.rb-staff{background:var(--c-gold-light);color:var(--c-gold-dark);}
.rb-passenger{background:#EBF4FB;color:#2980B9;}
[data-theme="dark"] .rb-admin{background:rgba(0,102,51,0.2);}
[data-theme="dark"] .rb-staff{background:rgba(201,168,76,0.15);}
[data-theme="dark"] .rb-passenger{background:rgba(41,128,185,0.15);}
.user-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;padding:12px;background:var(--surface-raised);border-radius:10px;}
.uc-stat-val{font-size:15px;font-weight:800;color:var(--c-green);}
.uc-stat-label{font-size:10px;color:var(--text-muted);margin-top:1px;}
.user-card-meta{font-size:12px;color:var(--text-muted);margin-bottom:14px;display:flex;flex-direction:column;gap:4px;}
.meta-line{display:flex;align-items:center;gap:6px;}
.user-card-actions{display:flex;gap:8px;}
.uca-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;border:1px solid var(--border);background:var(--surface-raised);color:var(--text-secondary);text-align:center;}
.uca-btn:hover{border-color:var(--c-green);color:var(--c-green);}
.uca-btn.danger:hover{border-color:#C0392B;color:#C0392B;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-active{background:#1A8A4A;}
.dot-inactive{background:#C0392B;}
.dot-pending{background:#C9A84C;}

/* Empty */
.empty-state{text-align:center;padding:60px;color:var(--text-muted);grid-column:1/-1;}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px;width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--surface-raised);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{background:#FDE8E8;color:#C0392B;}
.modal-body{padding:24px 28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.form-input,.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:all 0.2s;}
.form-input:focus,.form-select:focus{border-color:var(--c-green);box-shadow:0 0 0 3px rgba(0,102,51,0.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end;}
.btn-s{background:var(--surface-raised);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:inherit;}
.permissions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;}
.perm-item input{accent-color:var(--c-green);}
.perm-label{font-size:13px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--c-green);color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;display:none;align-items:center;gap:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,102,51,0.3);}
[dir="rtl"] .toast{right:auto;left:24px;}
.toast.show{display:flex;}

@media(max-width:1100px){.users-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.users-grid{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(2,1fr);}}

/* Sidebar icon-only brand */
.sb{width:var(--sidebar-w,260px);min-height:100vh;background:var(--sidebar-bg,#004D26);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
[dir="rtl"] .sb{left:auto;right:0;}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;}
.sb-ic{width:38px;height:38px;background:#C9A84C;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-nav{padding:12px 8px 8px;flex:1;overflow-y:auto;}
.sbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.30);letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin:12px 0 4px;}
.sbi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .2s;text-decoration:none;color:rgba(255,255,255,.78);font-size:13px;font-weight:500;margin-bottom:1px;}
.sbi:hover{background:rgba(255,255,255,.07);color:#fff;}
.sbi.active{background:rgba(201,168,76,.18);color:#C9A84C;font-weight:700;}
.sbi-ic{font-size:16px;width:20px;text-align:center;}
.sb-foot{padding:12px 8px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;}
.sb-av{width:32px;height:32px;background:#C9A84C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:700;color:#fff;}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);}

</style>
</head>
<body>
<nav class="sb">
  <div class="sb-brand"><div class="sb-ic">🚆</div></div>
  <div class="sb-nav" id="sidebar-nav-dyn"></div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">A</div>
      <div><div class="sb-uname" id="sb-name">Admin</div><div class="sb-urole" id="sb-role">Administrator</div></div>
      <div style="color:rgba(255,255,255,0.32);font-size:14px;cursor:pointer;margin-left:auto;" onclick="rwLogout()">↩</div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title" data-i18n="page-title">User Management</div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="toggleLang()" id="lang-btn">عربي</button>
      <button class="tb-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="btn-primary" onclick="openModal()"><span>+</span><span data-i18n="add-user">Add User</span></button>
    </div>
  </div>
  <div class="content">

    <div class="stats-row">
      <div class="stat-box"><div class="stat-icon">👥</div><div><div class="stat-val" id="s-total">0</div><div class="stat-label" data-i18n="s-total-label">Total Users</div></div></div>
      <div class="stat-box"><div class="stat-icon">🛡️</div><div><div class="stat-val" style="color:var(--c-green);" id="s-admin">0</div><div class="stat-label" data-i18n="s-admin-label">Admins</div></div></div>
      <div class="stat-box"><div class="stat-icon">🎫</div><div><div class="stat-val" style="color:var(--c-gold);" id="s-staff">0</div><div class="stat-label" data-i18n="s-staff-label">Staff</div></div></div>
      <div class="stat-box"><div class="stat-icon">👤</div><div><div class="stat-val" style="color:#2980B9;" id="s-passengers">0</div><div class="stat-label" data-i18n="s-pass-label">Passengers</div></div></div>
    </div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="filterRole('all',this)"><span data-i18n="tab-all">All Users</span><span class="tab-count" id="tc-all">0</span></button>
      <button class="role-tab" onclick="filterRole('admin',this)"><span>🛡️</span><span data-i18n="tab-admin">Admins</span><span class="tab-count" id="tc-admin">0</span></button>
      <button class="role-tab" onclick="filterRole('staff',this)"><span>🎫</span><span data-i18n="tab-staff">Staff</span><span class="tab-count" id="tc-staff">0</span></button>
      <button class="role-tab" onclick="filterRole('passenger',this)"><span>👤</span><span data-i18n="tab-pass">Passengers</span><span class="tab-count" id="tc-pass">0</span></button>
    </div>

    <div class="filters-bar">
      <div class="fg search-fg">
        <label data-i18n="f-search">Search</label>
        <div class="si-wrap"><span class="si">🔍</span><input type="text" id="search-input" placeholder="Name, email, ID..." oninput="applyFilters()"></div>
      </div>
      <div class="fg">
        <label data-i18n="f-status">Status</label>
        <select id="f-status" onchange="applyFilters()">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="pending">Pending Verification</option>
        </select>
      </div>
      <div class="fg">
        <label data-i18n="f-verified">ID Verified</label>
        <select id="f-verified" onchange="applyFilters()">
          <option value="">All</option>
          <option value="true">Verified</option>
          <option value="false">Not Verified</option>
        </select>
      </div>
      <button class="tb-btn" onclick="clearFilters()" data-i18n="clear">Clear</button>
    </div>

    <div class="users-grid" id="users-grid"></div>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title" data-i18n="modal-add-title">Add New User</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-first">First Name</label><input type="text" class="form-input" id="m-first" placeholder="Mohammed"></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-last">Last Name</label><input type="text" class="form-input" id="m-last" placeholder="Al-Rashidi"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="ml-email">Email</label><input type="email" class="form-input" id="m-email" placeholder="user@email.com"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-phone">Phone</label><input type="tel" class="form-input" id="m-phone" placeholder="05XXXXXXXX"></div>
        <div class="form-group"><label class="form-label" data-i18n="ml-national-id">National ID</label><input type="text" class="form-input" id="m-nid" placeholder="1XXXXXXXXX" maxlength="10"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" data-i18n="ml-role">Role</label>
          <select class="form-select" id="m-role">
            <option value="passenger">Passenger</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label" data-i18n="ml-status">Status</label>
          <select class="form-select" id="m-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="pending">Pending Verification</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="ml-password">Password</label><input type="password" class="form-input" id="m-password" placeholder="Min 8 characters"></div>
      <div class="form-group">
        <label class="form-label" data-i18n="ml-permissions">Permissions</label>
        <div class="permissions-grid" id="permissions-grid">
          <label class="perm-item"><input type="checkbox" id="p-schedules" checked><span class="perm-label" data-i18n="p-schedules">Manage Schedules</span></label>
          <label class="perm-item"><input type="checkbox" id="p-bookings" checked><span class="perm-label" data-i18n="p-bookings">View Bookings</span></label>
          <label class="perm-item"><input type="checkbox" id="p-routes"><span class="perm-label" data-i18n="p-routes">Manage Routes</span></label>
          <label class="perm-item"><input type="checkbox" id="p-users"><span class="perm-label" data-i18n="p-users">Manage Users</span></label>
          <label class="perm-item"><input type="checkbox" id="p-reports" checked><span class="perm-label" data-i18n="p-reports">View Reports</span></label>
          <label class="perm-item"><input type="checkbox" id="p-pricing"><span class="perm-label" data-i18n="p-pricing">Manage Pricing</span></label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-s" onclick="closeModal()" data-i18n="cancel">Cancel</button>
      <button class="btn-primary" onclick="saveUser()" data-i18n="save-user">Save User</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ <span id="toast-msg">Saved!</span></div>

<script>
let currentLang=localStorage.getItem('rw-lang')||'en';
let currentTheme=localStorage.getItem('rw-theme')||'light';
let currentRoleFilter='all';
let editingId=null;

const i18n={
  en:{'nav-main':'Main','nav-home':'Home','nav-dashboard':'Dashboard','nav-ops':'Operations','nav-schedules':'Schedules','nav-routes':'Routes','nav-occupancy':'Occupancy','nav-passenger':'Passenger','nav-booking':'Book Ticket','nav-history':'History','nav-admin':'Admin','nav-users':'Users','page-title':'User Management','add-user':'Add User','s-total-label':'Total Users','s-admin-label':'Admins','s-staff-label':'Staff','s-pass-label':'Passengers','tab-all':'All Users','tab-admin':'Admins','tab-staff':'Staff','tab-pass':'Passengers','f-search':'Search','f-status':'Status','f-verified':'ID Verified','clear':'Clear','modal-add-title':'Add New User','modal-edit-title':'Edit User','ml-first':'First Name','ml-last':'Last Name','ml-email':'Email','ml-phone':'Phone','ml-national-id':'National ID','ml-role':'Role','ml-status':'Status','ml-password':'Password','ml-permissions':'Permissions','p-schedules':'Manage Schedules','p-bookings':'View Bookings','p-routes':'Manage Routes','p-users':'Manage Users','p-reports':'View Reports','p-pricing':'Manage Pricing','cancel':'Cancel','save-user':'Save User','lang-btn':'عربي'},
  ar:{'nav-main':'الرئيسية','nav-home':'الرئيسية','nav-dashboard':'لوحة التحكم','nav-ops':'العمليات','nav-schedules':'الجداول','nav-routes':'المسارات','nav-occupancy':'الإشغال','nav-passenger':'الركاب','nav-booking':'حجز تذكرة','nav-history':'السجل','nav-admin':'الإدارة','nav-users':'المستخدمون','page-title':'إدارة المستخدمين','add-user':'إضافة مستخدم','s-total-label':'إجمالي المستخدمين','s-admin-label':'المدراء','s-staff-label':'الموظفون','s-pass-label':'الركاب','tab-all':'الكل','tab-admin':'المدراء','tab-staff':'الموظفون','tab-pass':'الركاب','f-search':'بحث','f-status':'الحالة','f-verified':'الهوية','clear':'مسح','modal-add-title':'إضافة مستخدم جديد','modal-edit-title':'تعديل المستخدم','ml-first':'الاسم الأول','ml-last':'اسم العائلة','ml-email':'البريد الإلكتروني','ml-phone':'الجوال','ml-national-id':'الهوية الوطنية','ml-role':'الدور','ml-status':'الحالة','ml-password':'كلمة المرور','ml-permissions':'الصلاحيات','p-schedules':'إدارة الجداول','p-bookings':'عرض الحجوزات','p-routes':'إدارة المسارات','p-users':'إدارة المستخدمين','p-reports':'عرض التقارير','p-pricing':'إدارة التسعير','cancel':'إلغاء','save-user':'حفظ المستخدم','lang-btn':'English'}
};

const roleDef={en:{admin:'Admin',staff:'Staff',passenger:'Passenger'},ar:{admin:'مدير',staff:'موظف',passenger:'راكب'}};
const statusDef={en:{active:'Active',inactive:'Inactive',pending:'Pending Verification'},ar:{active:'نشط',inactive:'غير نشط',pending:'بانتظار التحقق'}};

let users=[
  {id:1,first:'Abdullah',last:'Al-Rashidi',email:'admin@railwaysa.com',phone:'0551234567',nid:'1093847261',role:'admin',status:'active',verified:true,joined:'2025-01-15',bookings:0,spent:0,lastLogin:'2026-05-02'},
  {id:2,first:'Sara',last:'Al-Qahtani',email:'staff@railwaysa.com',phone:'0559876543',nid:'2187364920',role:'staff',status:'active',verified:true,joined:'2025-03-01',bookings:0,spent:0,lastLogin:'2026-05-01'},
  {id:3,first:'Mohammed',last:'Al-Ghamdi',email:'user@railwaysa.com',phone:'0508765432',nid:'1072938461',role:'passenger',status:'active',verified:true,joined:'2025-06-10',bookings:14,spent:2840,lastLogin:'2026-04-30'},
  {id:4,first:'Fatimah',last:'Al-Zahrani',email:'fatimah@email.com',phone:'0507654321',nid:'2093847561',role:'passenger',status:'active',verified:true,joined:'2025-08-22',bookings:7,spent:1260,lastLogin:'2026-04-28'},
  {id:5,first:'Omar',last:'Al-Otaibi',email:'omar@email.com',phone:'0506543210',nid:'1082736451',role:'passenger',status:'inactive',verified:false,joined:'2025-09-05',bookings:2,spent:240,lastLogin:'2026-03-10'},
  {id:6,first:'Khalid',last:'Al-Shehri',email:'khalid@email.com',phone:'0505432109',nid:'1091827364',role:'staff',status:'active',verified:true,joined:'2025-10-12',bookings:0,spent:0,lastLogin:'2026-05-01'},
  {id:7,first:'Noura',last:'Al-Harbi',email:'noura@email.com',phone:'0504321098',nid:'2098172634',role:'passenger',status:'active',verified:true,joined:'2025-11-03',bookings:5,spent:680,lastLogin:'2026-04-25'},
  {id:8,first:'Bandar',last:'Al-Mutairi',email:'bandar@email.com',phone:'0503210987',nid:'1087364920',role:'passenger',status:'pending',verified:false,joined:'2026-02-14',bookings:1,spent:350,lastLogin:'2026-04-20'},
  {id:9,first:'Reem',last:'Al-Dossari',email:'reem@email.com',phone:'0502109876',nid:'2076453819',role:'passenger',status:'active',verified:true,joined:'2026-03-01',bookings:3,spent:450,lastLogin:'2026-05-02'},
];
let filtered=[...users];

function getInitials(u){return (u.first[0]+(u.last[0]||'')).toUpperCase();}
function avatarClass(role){return role==='admin'?'avatar-admin':role==='staff'?'avatar-staff':'avatar-passenger';}
function roleBadgeClass(role){return role==='admin'?'rb-admin':role==='staff'?'rb-staff':'rb-passenger';}

function renderUsers(){
  const l=currentLang;
  if(filtered.length===0){
    document.getElementById('users-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">👥</div><p>${l==='ar'?'لا يوجد مستخدمون':'No users found'}</p></div>`;
    return;
  }
  document.getElementById('users-grid').innerHTML=filtered.map(u=>`
    <div class="user-card">
      <div class="user-card-top">
        <div class="user-avatar-big ${avatarClass(u.role)}">
          ${getInitials(u)}
          ${u.verified?'<div class="verified-badge">✓</div>':''}
        </div>
        <div class="user-card-info">
          <div class="uc-name">${u.first} ${u.last}</div>
          <div class="uc-email">${u.email}</div>
          <span class="uc-role-badge ${roleBadgeClass(u.role)}">${roleDef[l][u.role]||u.role}</span>
        </div>
      </div>
      <div class="user-card-stats">
        <div><div class="uc-stat-val">${u.bookings}</div><div class="uc-stat-label">${l==='ar'?'حجوزات':'Bookings'}</div></div>
        <div><div class="uc-stat-val">${u.spent>0?'SAR '+u.spent:'—'}</div><div class="uc-stat-label">${l==='ar'?'مُنفَق':'Spent'}</div></div>
        <div><div class="uc-stat-val" style="color:${u.verified?'var(--c-green)':'#C0392B'}">${u.verified?(l==='ar'?'✓ نعم':'✓ Yes'):(l==='ar'?'✗ لا':'✗ No')}</div><div class="uc-stat-label">${l==='ar'?'موثق':'Verified'}</div></div>
      </div>
      <div class="user-card-meta">
        <div class="meta-line"><span class="status-dot dot-${u.status}"></span><span>${statusDef[l][u.status]||u.status}</span></div>
        <div class="meta-line"><span>📅</span><span>${l==='ar'?'انضم:':'Joined:'} ${u.joined}</span></div>
        <div class="meta-line"><span>🕐</span><span>${l==='ar'?'آخر دخول:':'Last login:'} ${u.lastLogin}</span></div>
        <div class="meta-line"><span>📱</span><span>${u.phone}</span></div>
      </div>
      <div class="user-card-actions">
        <button class="uca-btn" onclick="editUser(${u.id})">${l==='ar'?'تعديل':'Edit'}</button>
        <button class="uca-btn" onclick="toggleStatus(${u.id})">${u.status==='active'?(l==='ar'?'تعطيل':'Deactivate'):(l==='ar'?'تفعيل':'Activate')}</button>
        <button class="uca-btn danger" onclick="deleteUser(${u.id})">${l==='ar'?'حذف':'Delete'}</button>
      </div>
    </div>`).join('');
}

function updateStats(){
  const admins=users.filter(u=>u.role==='admin').length;
  const staff=users.filter(u=>u.role==='staff').length;
  const passengers=users.filter(u=>u.role==='passenger').length;
  document.getElementById('s-total').textContent=users.length;
  document.getElementById('s-admin').textContent=admins;
  document.getElementById('s-staff').textContent=staff;
  document.getElementById('s-passengers').textContent=passengers;
  document.getElementById('tc-all').textContent=users.length;
  document.getElementById('tc-admin').textContent=admins;
  document.getElementById('tc-staff').textContent=staff;
  document.getElementById('tc-pass').textContent=passengers;
}

function filterRole(role,btn){
  currentRoleFilter=role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('f-status').value;
  const vf=document.getElementById('f-verified').value;
  filtered=users.filter(u=>{
    const mRole=currentRoleFilter==='all'||u.role===currentRoleFilter;
    const mQ=!q||(u.first+u.last+u.email+u.nid+u.phone).toLowerCase().includes(q);
    const mSt=!st||u.status===st;
    const mV=!vf||String(u.verified)===vf;
    return mRole&&mQ&&mSt&&mV;
  });
  renderUsers();
}

function clearFilters(){document.getElementById('search-input').value='';document.getElementById('f-status').value='';document.getElementById('f-verified').value='';filtered=[...users];renderUsers();}

function openModal(){
  editingId=null;
  document.getElementById('modal-title').textContent=i18n[currentLang]['modal-add-title'];
  ['m-first','m-last','m-email','m-phone','m-nid','m-password'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-role').value='passenger';
  document.getElementById('m-status').value='active';
  document.getElementById('user-modal').classList.add('open');
}

function editUser(id){
  const u=users.find(x=>x.id===id);if(!u)return;
  editingId=id;
  document.getElementById('modal-title').textContent=i18n[currentLang]['modal-edit-title'];
  document.getElementById('m-first').value=u.first;
  document.getElementById('m-last').value=u.last;
  document.getElementById('m-email').value=u.email;
  document.getElementById('m-phone').value=u.phone;
  document.getElementById('m-nid').value=u.nid;
  document.getElementById('m-role').value=u.role;
  document.getElementById('m-status').value=u.status;
  document.getElementById('m-password').value='';
  document.getElementById('user-modal').classList.add('open');
}

function closeModal(){document.getElementById('user-modal').classList.remove('open');editingId=null;}

function saveUser(){
  const first=document.getElementById('m-first').value.trim();
  const last=document.getElementById('m-last').value.trim();
  const email=document.getElementById('m-email').value.trim();
  if(!first||!last||!email){showToast(currentLang==='ar'?'يرجى ملء الحقول الإلزامية':'Please fill required fields');return;}
  if(editingId){
    const idx=users.findIndex(x=>x.id===editingId);
    users[idx]={...users[idx],first,last,email,phone:document.getElementById('m-phone').value,nid:document.getElementById('m-nid').value,role:document.getElementById('m-role').value,status:document.getElementById('m-status').value};
  }else{
    users.push({id:Date.now(),first,last,email,phone:document.getElementById('m-phone').value,nid:document.getElementById('m-nid').value,role:document.getElementById('m-role').value,status:document.getElementById('m-status').value,verified:false,joined:new Date().toISOString().split('T')[0],bookings:0,spent:0,lastLogin:'—'});
  }
  filtered=[...users];updateStats();renderUsers();closeModal();
  showToast(currentLang==='ar'?'تم حفظ المستخدم!':'User saved successfully!');
}

function toggleStatus(id){
  const u=users.find(x=>x.id===id);if(!u)return;
  u.status=u.status==='active'?'inactive':'active';
  applyFilters();updateStats();
}

function deleteUser(id){
  if(!confirm(currentLang==='ar'?'هل تريد حذف هذا المستخدم؟':'Delete this user?'))return;
  users=users.filter(x=>x.id!==id);filtered=users.filter(u=>currentRoleFilter==='all'||u.role===currentRoleFilter);
  updateStats();renderUsers();showToast(currentLang==='ar'?'تم حذف المستخدم':'User deleted');
}

function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function applyTheme(t){currentTheme=t;localStorage.setItem('rw-theme',t);document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){applyTheme(currentTheme==='light'?'dark':'light');}
function applyLang(lang){
  currentLang=lang;localStorage.setItem('rw-lang',lang);
  document.documentElement.setAttribute('lang',lang);document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k])el.textContent=i18n[lang][k];});
  document.getElementById('lang-btn').textContent=i18n[lang]['lang-btn'];
  renderUsers();
}
function toggleLang(){applyLang(currentLang==='en'?'ar':'en');}

const loggedUser=JSON.parse(localStorage.getItem('rw-user')||'{"email":"admin@railwaysa.com","role":"admin"}');
document.getElementById('user-avatar').textContent=loggedUser.email[0].toUpperCase();
document.getElementById('user-name').textContent=loggedUser.email.split('@')[0];
document.getElementById('user-role').textContent=loggedUser.role;
applyTheme(currentTheme);
updateStats();
applyLang(currentLang);

// Role guard — redirect if not admin or staff
(function(){
  const u = JSON.parse(localStorage.getItem('rw-user') || '{"role":"passenger"}');
  if(u.role === 'passenger') window.location.href = 'home-passenger.html';
  // Update Home link dynamically
  const homeLinks = document.querySelectorAll('a[href="home-admin.html"]');
  homeLinks.forEach(l => {
    if(u.role === 'staff') l.href = 'home-staff.html';
  });
})();

// Dynamic sidebar nav based on role
(function(){
  var u=window.RW_USER||{};
  var el=document.getElementById('sidebar-nav-dyn');
  if(!el)return;
  if(u.role==='admin'){
    el.innerHTML=`    <div class="sbl">Main</div>
    <a href="home-admin.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="dashboard.html" class="sbi "><span class="sbi-ic">📊</span><span>Dashboard</span></a>
    <div class="sbl">Operations</div>
    <a href="schedules.html" class="sbi "><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="routes.html" class="sbi "><span class="sbi-ic">🗺️</span><span>Routes</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <div class="sbl">Management</div>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>
    <a href="users.html" class="sbi active"><span class="sbi-ic">👥</span><span>Users</span></a>`;
  }else{
    el.innerHTML=`    <div class="sbl">Operations</div>
    <a href="home-staff.html" class="sbi" data-home-link><span class="sbi-ic">🏠</span><span>Home</span></a>
    <a href="schedules.html" class="sbi "><span class="sbi-ic">📅</span><span>Schedules</span></a>
    <a href="occupancy.html" class="sbi "><span class="sbi-ic">💺</span><span>Occupancy</span></a>
    <a href="admin-bookings.html" class="sbi"><span class="sbi-ic">📋</span><span>Bookings</span></a>`;
  }
})();
</script>
</body>
